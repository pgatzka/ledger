name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        # Deterministic + offline. The pipeline integration test auto-skips
        # unless ANTHROPIC_API_KEY is provided. To un-skip it, add the key as a
        # repository secret and uncomment the env block below.
        run: npm test
        # env:
        #   ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build
        run: npm run build
