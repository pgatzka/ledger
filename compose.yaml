# Run Thought-to-Docs with Docker Compose.
#
# Anthropic (default):
#   echo "ANTHROPIC_API_KEY=sk-ant-..." > .env   # or ANTHROPIC_AUTH_TOKEN=sk-ant-oat01-...
#   docker compose up --build                    # http://localhost:3000  (add -d to detach)
#
# Fully local with Ollama (no API key, no credits):
#   1. Uncomment the three OLLAMA_* / LLM_PROVIDER lines under `app` below.
#   2. docker compose --profile ollama up -d --build
#   3. docker compose exec ollama ollama pull llama3.1:8b   # one-time model download
#
# Data persists on named volumes across `docker compose down` (add -v to wipe).

services:
  app:
    # Build the image from this repo. To run the published image instead,
    # comment out `build` and uncomment `image`:
    build: .
    # image: ghcr.io/pgatzka/ledger:latest
    ports:
      - "3000:3000"
    environment:
      # --- Option 1: local Ollama (uncomment; run with `--profile ollama`) ---
      # LLM_PROVIDER: ollama
      # OLLAMA_URL: http://ollama:11434     # the `ollama` service below
      # OLLAMA_MODEL: llama3.1:8b
      #
      # --- Option 2: Anthropic (default) — set ONE in a local .env file ------
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional overrides (defaults are baked into the image):
      # ROUTE_MODEL: claude-haiku-4-5-20251001
      # OPERATE_MODEL: claude-sonnet-5
      # ROUTE_CONFIDENCE_THRESHOLD: "0.6"
    volumes:
      # Persists /app/data/ledger.db (DATABASE_PATH is preset in the image).
      - ledger-data:/app/data
    restart: unless-stopped

  # Optional local model server. Only started when the `ollama` profile is on:
  #   docker compose --profile ollama up
  # After it's up, pull a model once:
  #   docker compose exec ollama ollama pull llama3.1:8b
  ollama:
    image: ollama/ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  ledger-data:
  ollama-models:
