# Run Thought-to-Docs with Docker Compose — app + a local Ollama model server.
#
#   docker compose up --build     # http://localhost:3000  (add -d to detach)
#
# `ollama-pull` downloads the model on first start, so no manual step is needed.
# Data persists on named volumes across `docker compose down` (add -v to wipe).

services:
  app:
    # Build the image from this repo. To run the published image instead,
    # comment out `build` and uncomment `image`:
    build: .
    # image: ghcr.io/pgatzka/ledger:latest
    ports:
      - "3000:3000"
    environment:
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
      # ROUTE_CONFIDENCE_THRESHOLD: "0.6"
    volumes:
      # Persists /app/data/ledger.db (DATABASE_PATH is preset in the image).
      - ledger-data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  # Local model server. Models persist on the ollama-models volume.
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  # One-shot: wait for the server, then pull the model so the app works
  # out of the box. Exits when done; safe to re-run (pull is cached).
  ollama-pull:
    image: ollama/ollama
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull llama3.1:8b"]
    restart: "no"

volumes:
  ledger-data:
  ollama-models:
