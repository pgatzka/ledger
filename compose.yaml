# Run Thought-to-Docs with Docker Compose.
#
#   echo "ANTHROPIC_API_KEY=sk-ant-..." > .env
#   docker compose up --build          # http://localhost:3000  (add -d to detach)
#
# The SQLite database lives on the named `ledger-data` volume, so it survives
# `docker compose down` and restarts.

services:
  app:
    # Build the image from this repo. To run the published image instead,
    # comment out `build` and uncomment `image`:
    build: .
    # image: ghcr.io/pgatzka/ledger:latest
    ports:
      - "3000:3000"
    environment:
      # Option 1 — local Ollama (no API key). Uncomment; use host.docker.internal
      # so the container can reach Ollama running on the host:
      # LLM_PROVIDER: ollama
      # OLLAMA_URL: http://host.docker.internal:11434
      # OLLAMA_MODEL: llama3.1:8b
      #
      # Option 2 — Anthropic. Provide ONE of these via a local .env file
      # (auto-loaded by Compose). The app prefers the subscription token.
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    # extra_hosts:            # needed on Linux for host.docker.internal
    #   - "host.docker.internal:host-gateway"
      # Optional overrides (defaults are baked into the image):
      # ROUTE_MODEL: claude-haiku-4-5-20251001
      # OPERATE_MODEL: claude-sonnet-5
      # ROUTE_CONFIDENCE_THRESHOLD: "0.6"
    volumes:
      # Persists /app/data/ledger.db (DATABASE_PATH is preset in the image).
      - ledger-data:/app/data
    restart: unless-stopped

volumes:
  ledger-data:
